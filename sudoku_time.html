<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFun Game</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* 导航基础样式：固定置顶、默认透明背景 */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999;
            background-color: rgba(50, 50, 50, 0.95);
            transition: background-color 0.3s ease;
            padding: 15px 5%;
            box-sizing: border-box;
        }

        /* 顶部留白 + 匹配主页类名 */
        body.sub-page {
            padding-top: 60px;
        }

        /* 重置下拉菜单：取消固定宽度，自适应文字 */
        .dropdown-menu {
            min-width: auto !important;
            width: auto !important;
            white-space: nowrap; /* 禁止文字换行 */
        }

        /* Logo 容器样式：水平+垂直居中 */
        .nav-logo {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            height: 40px;
            opacity: 1;         /* 由 0 改成 1 */
            visibility: visible; /* 由 hidden 改成 visible */
            transition: opacity 0.3s ease;
        }
        .nav-logo img {
            height: 100%;
            width: auto;
            display: block;
        }
        /* 清除a标签默认下划线 */
        .nav-logo a {
            text-decoration: none;
        }
        /* 滚动出背景时，显示Logo */
        .nav.scroll-bg .nav-logo {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<!-- 加上 class="main-page"，才能读取外部样式里的主页背景色 -->
<body class="sub-page">
    <!-- 顶部导航栏 -->
    <nav class="nav">
        <!-- Logo 加跳转链接 -->
        <div class="nav-logo">
            <a href="index.html">
                <img src="images/logo.png" alt="Logo">
            </a>
        </div>

        <div class="nav-box">
            <!-- 游戏下拉菜单 -->
            <div class="dropdown">
                <a href="#" class="nav-item">Games ▾</a>
                <div class="dropdown-menu">
                    <a href="minesweeper-gm.html">Minesweeper GM</a>
                    <a href="sudoku_time.html">Vinci's Sudoku Time</a>
                </div>
            </div>
        </div>
    </nav>

<!-- 横幅大图区域 -->
<div class="banner" style="text-align: center; margin: 30px auto;">
    <img src="images/sudokutime/poster-0.png" alt="ZenFun Game Banner" style="width: 1000px; height: auto; max-width: 100%;">
</div>

    <!-- 主体内容区 -->
    <div class="content">
        <h1>Vinci's Sudoku Time</h1>
        <p>Classic Puzzle Game!</p>
    </div>

    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>

    <!-- 底部 -->
    <footer class="footer">
        <p>Contact Us: thdydb59@gmail.com</p>
    </footer>

<script>
// 监听页面滚动
window.addEventListener('scroll', function(){
    const nav = document.querySelector('.nav');
    if(window.scrollY > 20){
        nav.classList.add('scroll-bg');
    }else{
        nav.classList.remove('scroll-bg');
    }
})
</script>
</body>
</html>
